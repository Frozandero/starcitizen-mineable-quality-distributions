<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Citizen - Quality Distribution Visualizer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d9ff, #00ff88, #00d9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 217, 255, 0.3);
        }

        .version-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .version-label {
            font-family: 'Orbitron', sans-serif;
            color: #00d9ff;
            font-size: 1rem;
        }

        #version-select {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 217, 255, 0.5);
            color: #fff;
            padding: 10px 20px;
            border-radius: 6px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            min-width: 250px;
        }

        #version-select option {
            background: #1a1a2e;
            color: #e0e0e0;
        }

        #version-select:hover {
            border-color: #00d9ff;
            background: rgba(0, 217, 255, 0.1);
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #00d9ff;
            font-size: 1.2rem;
        }

        .category-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .category-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(0, 217, 255, 0.3);
            color: #00d9ff;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
        }

        .chart-container {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 15px;
        }

        .chart-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            margin-bottom: 10px;
            color: #fff;
            text-align: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(0, 217, 255, 0.05);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 5px;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            color: #00d9ff;
        }

        .tooltip-icon {
            cursor: help;
            color: #ffc107;
            display: inline-block;
            width: 16px;
            height: 16px;
            background: rgba(255, 193, 7, 0.1);
            border-radius: 50%;
            text-align: center;
            line-height: 16px;
            font-size: 12px;
            font-weight: bold;
            user-select: none;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 8px;
        }

        .badge-default {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .badge-pyro {
            background: rgba(255, 100, 50, 0.2);
            color: #ff6432;
            border: 1px solid rgba(255, 100, 50, 0.5);
        }

        .legend {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin: 20px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color {
            width: 30px;
            height: 4px;
            border-radius: 2px;
        }

        .legend-label {
            font-size: 0.9rem;
            color: #aaa;
        }

        .info-box {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #ffc107;
        }

        .composition-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .rarity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .rarity-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .rarity-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.2);
        }

        .rarity-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .rarity-common {
            color: #ffffff;
            border-color: #ffffff;
        }

        .rarity-uncommon {
            color: #00ff88;
            border-color: #00ff88;
        }

        .rarity-rare {
            color: #0099ff;
            border-color: #0099ff;
        }

        .rarity-epic {
            color: #9900ff;
            border-color: #9900ff;
        }

        .rarity-legendary {
            color: #ff9900;
            border-color: #ff9900;
        }

        .rarity-rcd {
            color: #3296ff;
            border-color: #3296ff;
        }

        .yield-controls {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(50, 150, 255, 0.3);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .yield-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .yield-title {
            font-family: 'Orbitron', sans-serif;
            color: #3296ff;
            font-size: 1.1rem;
        }

        .yield-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: #00ff88;
        }

        .yield-sections {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        .yield-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .yield-section-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 5px;
        }

        .yield-checkboxes {
            display: flex;
            gap: 10px;
        }

        .yield-checkbox {
            width: 30px;
            height: 30px;
            cursor: pointer;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .yield-checkbox:checked {
            background: rgba(50, 150, 255, 0.3);
            border-color: #3296ff;
        }

        .yield-checkbox:checked::after {
            content: '✓';
            display: flex;
            justify-content: center;
            align-items: center;
            color: #3296ff;
            font-size: 18px;
            font-weight: bold;
        }

        .yield-note {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.3);
            border-radius: 6px;
            font-size: 0.85rem;
            color: #ffc107;
        }

        .rock-list {
            list-style: none;
        }

        .rock-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .rock-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .rock-name {
            font-weight: 600;
            font-size: 1rem;
            color: #fff;
            margin-bottom: 8px;
        }

        .rock-details {
            display: none;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .rock-item.expanded .rock-details {
            display: block;
        }

        .composition-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .composition-bar {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin: 0 10px;
            overflow: hidden;
            position: relative;
        }

        .composition-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .composition-label {
            min-width: 120px;
            color: #ccc;
        }

        .composition-range {
            min-width: 100px;
            text-align: right;
            color: #00d9ff;
            font-family: 'Orbitron', sans-serif;
        }

        .expand-hint {
            color: #666;
            font-size: 0.75rem;
            margin-left: auto;
        }

        .toggle-button {
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.3);
            color: #00d9ff;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .toggle-button:hover {
            background: rgba(0, 217, 255, 0.2);
        }

        .toggle-button.active {
            background: rgba(0, 217, 255, 0.2);
            border-color: #00d9ff;
        }

        @media (max-width: 768px) {

            .charts-grid,
            .rarity-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8rem;
            }

            .composition-row {
                flex-wrap: wrap;
            }

            .composition-bar {
                order: -1;
                width: 100%;
                margin: 5px 0;
            }

            .version-selector {
                flex-direction: column;
            }

            #version-select {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>STAR CITIZEN</h1>
            <p class="subtitle">Quality Distribution Analysis - Pyro System vs Default</p>

            <div class="version-selector">
                <span class="version-label">VERSION:</span>
                <select id="version-select">
                    <option value="">Loading versions...</option>
                </select>
            </div>
        </div>

        <div id="content">
            <div class="loading">Loading data...</div>
        </div>
    </div>

    <script>
        const VERSIONS = [{"id":"v4.7.0-PTU.11445650","label":"v4.7.0 PTU 11445650","path":"data/v4.7.0-PTU.11445650"},{"id":"v4.7.0-PTU.11429312","label":"v4.7.0 PTU 11429312","path":"data/v4.7.0-PTU.11429312"}];
        const DEFAULT_VERSION = {"id":"v4.7.0-PTU.11445650","label":"v4.7.0 PTU 11445650","path":"data/v4.7.0-PTU.11445650"};

        const rarityColors = {
            Common: '#ffffff',
            Uncommon: '#00ff88',
            Rare: '#0099ff',
            Epic: '#9900ff',
            Legendary: '#ff9900'
        };

        let currentVersion = null;
        let charts = [];

        function normalDistributionPDF(x, mean, stddev) {
            const exponent = -0.5 * Math.pow((x - mean) / stddev, 2);
            return (1 / (stddev * Math.sqrt(2 * Math.PI))) * Math.exp(exponent);
        }

        function generateDistributionData(dist, numPoints = 200) {
            const data = [];
            const step = (dist.max - 1) / numPoints;
            for (let i = 0; i <= numPoints; i++) {
                const x = 1 + i * step;
                if (x >= 1 && x <= dist.max) {
                    const y = normalDistributionPDF(x, dist.mean, dist.stddev);
                    data.push({ x: Math.round(x), y: parseFloat(y.toFixed(6)) });
                }
            }
            return data;
        }

        function destroyCharts() {
            charts.forEach(chart => chart.destroy());
            charts = [];
        }

        const overrideColors = {
            default: { border: 'rgba(255, 255, 255, 0.8)', bg: 'rgba(255, 255, 255, 0.1)', label: 'Default' },
            pyro: { border: 'rgba(255, 100, 50, 0.9)', bg: 'rgba(255, 100, 50, 0.15)', label: 'Pyro' },
            rcd: { border: 'rgba(50, 150, 255, 0.9)', bg: 'rgba(50, 150, 255, 0.15)', label: 'RCD' },
            torite: { border: 'rgba(255, 200, 50, 0.9)', bg: 'rgba(255, 200, 50, 0.15)', label: 'Torite' },
            nyx: { border: 'rgba(200, 50, 255, 0.9)', bg: 'rgba(200, 50, 255, 0.15)', label: 'Nyx' }
        };

        function getOverrideTypes(item) {
            const types = [];
            if (item.default) types.push('default');
            if (item.pyro) types.push('pyro');
            if (item.rcd) types.push('rcd');
            if (item.torite) types.push('torite');
            if (item.nyx) types.push('nyx');
            return types.filter(t => t !== 'default');
        }

        function createCategorySection(categoryData) {
            const section = document.createElement('div');
            section.className = 'category-section';

            const title = document.createElement('h2');
            title.className = 'category-title';
            title.textContent = categoryData.category;
            section.appendChild(title);

            const grid = document.createElement('div');
            grid.className = 'charts-grid';

            categoryData.items.forEach(item => {
                const container = document.createElement('div');
                container.className = 'chart-container';

                const chartTitle = document.createElement('h3');
                chartTitle.className = 'chart-title';

                const overrideTypes = getOverrideTypes(item);
                let badges = '<span class="badge badge-default">Default</span>';
                for (const type of overrideTypes) {
                    const color = overrideColors[type]?.label || type;
                    badges += ` <span class="badge badge-${type}" style="background: ${overrideColors[type]?.bg || 'rgba(255,255,255,0.1)'}; border: 1px solid ${overrideColors[type]?.border || 'rgba(255,255,255,0.3)'}; color: #fff">${overrideColors[type]?.label || type}</span>`;
                }
                chartTitle.innerHTML = `${item.name} ${badges}`;
                container.appendChild(chartTitle);

                const canvas = document.createElement('canvas');
                canvas.id = `chart-${categoryData.category.replace(/\s/g, '-')}-${item.name.replace(/\s/g, '-')}`;
                container.appendChild(canvas);

                const statsDiv = document.createElement('div');
                statsDiv.className = 'stats-grid';

                let statsHtml = '';

                if (item.default) {
                    statsHtml += `
                        <div class="stat-card">
                            <div class="stat-label">Default Mean</div>
                            <div class="stat-value">${item.default.mean}</div>
                        </div>
                    `;
                }

                for (const type of overrideTypes) {
                    const color = overrideColors[type]?.border || '#fff';
                    statsHtml += `
                        <div class="stat-card">
                            <div class="stat-label">${overrideColors[type]?.label || type} Mean</div>
                            <div class="stat-value" style="color: ${color}">${item[type].mean}</div>
                        </div>
                    `;
                }

                if (item.improvement) {
                    statsHtml += `
                        <div class="stat-card">
                            <div class="stat-label">Improvement</div>
                            <div class="stat-value" style="color: #00ff88">+${item.improvement}%</div>
                        </div>
                    `;
                }

                const minVal = item.default ? item.default.min : '?';
                statsHtml += `
                    <div class="stat-card">
                        <div class="stat-label" style="display: flex; align-items: center; gap: 5px;">
                            Quality Range
                            <span class="tooltip-icon" title="The low end of this range is theoretical based on normal distribution. It might not be used by the game currently.">?</span>
                        </div>
                        <div class="stat-value" style="font-size: 1rem">${minVal} - 1000</div>
                    </div>
                `;

                statsDiv.innerHTML = statsHtml;

                container.appendChild(statsDiv);
                grid.appendChild(container);

                const overrideTypesPresent = getOverrideTypes(item);
                const hasAnyData = (item.default && overrideTypesPresent.length > 0) || overrideTypesPresent.length > 0;

                if (hasAnyData) {
                    const ctx = canvas.getContext('2d');

                    const datasets = [];

                    if (item.default) {
                        datasets.push({
                            label: 'Default',
                            data: generateDistributionData(item.default),
                            borderColor: overrideColors.default.border,
                            backgroundColor: overrideColors.default.bg,
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0
                        });
                    }

                    for (const type of overrideTypesPresent) {
                        datasets.push({
                            label: overrideColors[type]?.label || type,
                            data: generateDistributionData(item[type]),
                            borderColor: overrideColors[type]?.border || '#fff',
                            backgroundColor: overrideColors[type]?.bg || 'rgba(255,255,255,0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0
                        });
                    }

                    const chart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            datasets: datasets
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    mode: 'index',
                                    intersect: false,
                                    backgroundColor: 'rgba(0, 0, 0, 0.8)',
                                    titleColor: '#00d9ff',
                                    bodyColor: '#fff',
                                    borderColor: 'rgba(0, 217, 255, 0.5)',
                                    borderWidth: 1,
                                    callbacks: {
                                        title: function (context) {
                                            if (context && context.length > 0) {
                                                return `Quality: ${Math.round(context[0].parsed.x)}`;
                                            }
                                            return '';
                                        }
                                    }
                                }
                            },
                            scales: {
                                x: {
                                    type: 'linear',
                                    min: 1,
                                    max: 1000,
                                    display: true,
                                    title: {
                                        display: true,
                                        text: 'Quality Level',
                                        color: '#888',
                                        font: { family: 'Rajdhani' }
                                    },
                                    ticks: { color: '#666', font: { family: 'Rajdhani' } },
                                    grid: { color: 'rgba(255, 255, 255, 0.05)' }
                                },
                                y: {
                                    beginAtZero: false,
                                    display: true,
                                    title: {
                                        display: true,
                                        text: 'Probability Density',
                                        color: '#888',
                                        font: { family: 'Rajdhani' }
                                    },
                                    ticks: { color: '#666', font: { family: 'Rajdhani' } },
                                    grid: { color: 'rgba(255, 255, 255, 0.05)' }
                                }
                            },
                            interaction: {
                                mode: 'nearest',
                                axis: 'x',
                                intersect: false
                            }
                        }
                    });

                    charts.push(chart);
                }
            });

            section.appendChild(grid);
            return section;
        }

        function createRarityCard(rarity, rocks) {
            const card = document.createElement('div');
            card.className = 'rarity-card';

            const title = document.createElement('div');
            title.className = `rarity-title rarity-${rarity.toLowerCase()}`;
            title.innerHTML = `<span>★</span> ${rarity}`;
            card.appendChild(title);

            const rockList = document.createElement('ul');
            rockList.className = 'rock-list';

            rocks.forEach(rock => {
                const rockItem = document.createElement('li');
                rockItem.className = 'rock-item';

                const rockName = document.createElement('div');
                rockName.className = 'rock-name';
                rockName.innerHTML = `${rock.name} <span class="expand-hint">▼</span>`;
                rockItem.appendChild(rockName);

                const details = document.createElement('div');
                details.className = 'rock-details';

                rock.compositions.forEach(comp => {
                    const row = document.createElement('div');
                    row.className = 'composition-row';

                    const label = document.createElement('span');
                    label.className = 'composition-label';
                    label.textContent = comp.mineral;

                    const bar = document.createElement('div');
                    bar.className = 'composition-bar';

                    const fill = document.createElement('div');
                    fill.className = 'composition-fill';
                    fill.style.width = `${comp.max}%`;
                    fill.style.background = rarityColors[rarity];
                    fill.style.opacity = '0.6';
                    bar.appendChild(fill);

                    const range = document.createElement('span');
                    range.className = 'composition-range';
                    range.textContent = `${comp.min}% - ${comp.max}%`;

                    row.appendChild(label);
                    row.appendChild(bar);
                    row.appendChild(range);
                    details.appendChild(row);
                });

                rockItem.appendChild(details);
                rockList.appendChild(rockItem);

                rockItem.addEventListener('click', () => {
                    rockItem.classList.toggle('expanded');
                    const hint = rockItem.querySelector('.expand-hint');
                    hint.textContent = rockItem.classList.contains('expanded') ? '▲' : '▼';
                });
            });

            card.appendChild(rockList);
            return card;
        }

        async function loadVersion(versionId) {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading">Loading data...</div>';

            try {
                const [qualityRes, rockRes] = await Promise.all([
                    fetch(`./data/${versionId}/quality_distributions.json`),
                    fetch(`./data/${versionId}/rock_compositions.json`)
                ]);

                const qualityJson = await qualityRes.json();
                const rockData = await rockRes.json();

                const qualityData = qualityJson.categories || qualityJson;
                const rockCrackerData = qualityJson.rockCrackerDistributions || null;

                renderContent(qualityData, rockData, rockCrackerData, versionId);
            } catch (error) {
                console.error('Error loading version data:', error);
                content.innerHTML = '<div class="loading">Error loading data. Please try again.</div>';
            }
        }

        function renderContent(qualityData, rockData, rockCrackerData, versionId) {
            const content = document.getElementById('content');
            destroyCharts();

            const versionLabel = VERSIONS.find(v => v.id === versionId)?.label || versionId;

            let legendHtml = `
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color" style="background: rgba(255, 255, 255, 0.6)"></div>
                        <span class="legend-label">Default Distribution</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: rgba(255, 100, 50, 0.8)"></div>
                        <span class="legend-label">Pyro Override</span>
                    </div>
            `;

            if (rockCrackerData && (rockCrackerData.rcd?.length > 0 || rockCrackerData.torite?.length > 0)) {
                if (rockCrackerData.rcd?.length > 0) {
                    legendHtml += `
                        <div class="legend-item">
                            <div class="legend-color" style="background: rgba(50, 150, 255, 0.8)"></div>
                            <span class="legend-label">RCD Override</span>
                        </div>
                    `;
                }
                if (rockCrackerData.torite?.length > 0) {
                    legendHtml += `
                        <div class="legend-item">
                            <div class="legend-color" style="background: rgba(255, 200, 50, 0.8)"></div>
                            <span class="legend-label">Torite Override</span>
                        </div>
                    `;
                }
            }
            legendHtml += `</div>`;

            let rcdSectionHtml = '';
            if (rockCrackerData && (rockCrackerData.rcd?.length > 0 || rockCrackerData.torite?.length > 0)) {
                rcdSectionHtml = `
                    <div class="category-section" id="rock-cracker-distributions">
                        <h2 class="category-title">⛏️ Rock Cracker Distributions</h2>
                        <div class="info-box">
                            <strong>Rock Cracker Distributions (RCD)</strong> - These are special quality distributions for the Rock Cracker Device (RCD) in Nyx. 
                            RCD applies to non-Torite nodes in RCD locations. Torite Override applies specifically to Torite rocks in RCD locations.
                            The values shown are averages across all RCD locations in the game. <b>These values are most likely the minimum values for the contract</b>
                        </div>
                        
                        <div class="yield-controls">
                            <div class="yield-header">
                                <span class="yield-title">Yield Bonus</span>
                                <span class="yield-value" id="yield-value">10%</span>
                            </div>
                            <div class="yield-sections">
                                <div class="yield-section">
                                    <span class="yield-section-label">Lenses (+10% each)</span>
                                    <div class="yield-checkboxes">
                                        <input type="checkbox" class="yield-checkbox" id="lens1" data-type="lens">
                                        <input type="checkbox" class="yield-checkbox" id="lens2" data-type="lens">
                                        <input type="checkbox" class="yield-checkbox" id="lens3" data-type="lens">
                                    </div>
                                </div>
                                <div class="yield-section">
                                    <span class="yield-section-label">Refractors (+20% each)</span>
                                    <div class="yield-checkboxes">
                                        <input type="checkbox" class="yield-checkbox" id="refractor1" data-type="refractor">
                                        <input type="checkbox" class="yield-checkbox" id="refractor2" data-type="refractor">
                                        <input type="checkbox" class="yield-checkbox" id="refractor3" data-type="refractor">
                                    </div>
                                </div>
                            </div>
                            <div class="yield-note">
                                <strong>Assumption:</strong> Each 10% yield bonus adds approximately 100 to the mean quality. 
                                This is an estimate based on current data and may not reflect actual game mechanics.
                            </div>
                        </div>
                        
                        <div class="rarity-grid" id="rcd-grid"></div>
                    </div>
                `;
            }

            let html = `
                <div class="info-box">
                    <strong>Note:</strong> These are normal distributions bounded by min/max values from game files (mean, min,
                    max, stddev). The charts show probability density of obtaining items at different quality levels (1-1000
                    scale). Pyro system overrides typically offer improved distributions compared to default settings.
                </div>

                ${legendHtml}

                <div id="quality-distributions"></div>

                ${rcdSectionHtml}

                <div class="composition-section" id="rock-compositions">
                    <h2 class="category-title">💎 Rock Composition Ranges</h2>
                    <div class="info-box">
                        <strong>Click on any mineral rock</strong> to see its composition breakdown. These ranges show the
                        minimum and maximum percentage of each mineral that can be found in a rock of that type. Values
                        represent the percentage composition of the rock's total content.
                    </div>

                    <div class="rarity-grid" id="rarity-grid"></div>
                </div>

                <footer style="margin-top: 60px; padding: 30px 20px; text-align: center; background: rgba(0, 0, 0, 0.5); border-top: 1px solid rgba(255, 255, 255, 0.1);">
                    <h3 style="font-family: 'Orbitron', sans-serif; color: #ff6432; margin-bottom: 15px;">Unofficial Fan Site</h3>
                    <p style="color: #888; font-size: 0.9rem; line-height: 1.6; max-width: 800px; margin: 0 auto;">
                        This site is not endorsed by or affiliated with Cloud Imperium or Roberts Space Industries group of companies.
                        All game content and materials are copyright Cloud Imperium Rights LLC and Cloud Imperium Rights Ltd.
                        Star Citizen®, Squadron 42®, Roberts Space Industries®, and Cloud Imperium® are registered trademarks of
                        Cloud Imperium Rights LLC. All rights reserved. This is a community-created tool for informational purposes only.
                    </p>
                    <p style="margin-top: 20px; color: #666; font-size: 0.8rem;">
                        Data sourced from Star Citizen ${versionLabel} patch files
                    </p>
                </footer>
            `;

            content.innerHTML = html;

            const qualityContainer = document.getElementById('quality-distributions');

            const categoryOrder = ['Ship Mineables', 'Harvestables', 'Ground Mineables', 'FPS Mineables', 'Creatures'];

            for (const category of categoryOrder) {
                const items = qualityData[category];
                if (items && items.length > 0) {
                    qualityContainer.appendChild(createCategorySection({ category, items }));
                }
            }

            if (rockCrackerData && (rockCrackerData.rcd?.length > 0 || rockCrackerData.torite?.length > 0)) {
                const rcdGrid = document.getElementById('rcd-grid');

                if (rockCrackerData.rcd?.length > 0) {
                    rcdGrid.appendChild(createCategorySection({ category: 'RCD (Non-Torite)', items: rockCrackerData.rcd }));
                }
                if (rockCrackerData.torite?.length > 0) {
                    rcdGrid.appendChild(createCategorySection({ category: 'Torite Only', items: rockCrackerData.torite }));
                }
            }

            const rarityGrid = document.getElementById('rarity-grid');
            for (const [rarity, rocks] of Object.entries(rockData)) {
                if (rocks && rocks.length > 0) {
                    rarityGrid.appendChild(createRarityCard(rarity, rocks));
                }
            }

            // Setup yield controls for RCD section
            if (rockCrackerData && (rockCrackerData.rcd?.length > 0 || rockCrackerData.torite?.length > 0)) {
                setupYieldControls(rockCrackerData);
            }
        }

        let rcdDataStore = null;

        function setupYieldControls(rockCrackerData) {
            rcdDataStore = rockCrackerData;
            
            const checkboxes = document.querySelectorAll('.yield-checkbox');
            const yieldValueEl = document.getElementById('yield-value');
            
            function calculateYield() {
                let yieldPercent = 10; // Base yield
                
                const lensCheckboxes = document.querySelectorAll('#lens1, #lens2, #lens3');
                const refractorCheckboxes = document.querySelectorAll('#refractor1, #refractor2, #refractor3');
                
                lensCheckboxes.forEach(cb => {
                    if (cb.checked) yieldPercent += 10;
                });
                
                refractorCheckboxes.forEach(cb => {
                    if (cb.checked) yieldPercent += 20;
                });
                
                yieldValueEl.textContent = yieldPercent + '%';
                
                updateRcdCharts(yieldPercent);
            }
            
            checkboxes.forEach(cb => {
                cb.addEventListener('change', calculateYield);
            });
            
            // Initial calculation
            calculateYield();
        }

        function updateRcdCharts(yieldPercent) {
            if (!rcdDataStore) return;
            
            // Remove old RCD charts
            const rcdGrid = document.getElementById('rcd-grid');
            rcdGrid.innerHTML = '';
            
            const baseYield = 10;
            const yieldBonus = yieldPercent - baseYield;
            const meanBonus = (yieldBonus / 10) * 100; // Each 10% adds 100 to mean
            
            // Create modified data with adjusted means
            const adjustedRcd = rcdDataStore.rcd?.map(item => ({
                ...item,
                rcd: item.rcd ? {
                    ...item.rcd,
                    mean: Math.min(item.rcd.mean + meanBonus, 1000)
                } : null
            })) || [];
            
            const adjustedTorite = rcdDataStore.torite?.map(item => ({
                ...item,
                torite: item.torite ? {
                    ...item.torite,
                    mean: Math.min(item.torite.mean + meanBonus, 1000)
                } : null
            })) || [];
            
            if (adjustedRcd.length > 0) {
                rcdGrid.appendChild(createCategorySection({ category: 'RCD (Non-Torite)', items: adjustedRcd }));
            }
            if (adjustedTorite.length > 0) {
                rcdGrid.appendChild(createCategorySection({ category: 'Torite Only', items: adjustedTorite }));
            }
        }

        function init() {
            const select = document.getElementById('version-select');

            select.innerHTML = '';

            VERSIONS.forEach(version => {
                const option = document.createElement('option');
                option.value = version.id;
                option.textContent = version.label;
                select.appendChild(option);
            });

            select.value = DEFAULT_VERSION.id;

            select.addEventListener('change', (e) => {
                loadVersion(e.target.value);
            });

            loadVersion(DEFAULT_VERSION.id);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
